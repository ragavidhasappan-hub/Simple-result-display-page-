<!DOCTYPE html>
<html>
<head>
    <title>Simple Result Display Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Student Result Display System</h1>

        <input type="text" id="name" placeholder="Enter Student Name">

        <input type="number" id="mark1" placeholder="Subject 1 Marks">

        <input type="number" id="mark2" placeholder="Subject 2 Marks">

        <input type="number" id="mark3" placeholder="Subject 3 Marks">

        <button onclick="showResult()">Generate Result</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
